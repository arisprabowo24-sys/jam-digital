<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexaTest Simulator - Log & Reset</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --primary: #00ff88;
            --accent: #2980b9;
            --danger: #ff4757;
            --warning: #f39c12;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container { width: 95%; max-width: 900px; padding: 20px; }
        
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2d2d2d;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
            padding: 12px;
        }

        .btn-start { background: var(--primary); color: #000; flex: 2; }
        .btn-stop { background: var(--danger); color: white; flex: 1; }
        .btn-save { background: var(--warning); color: white; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        
        /* Log Buttons */
        .log-controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn-download { background: #27ae60; color: white; flex: 1; }
        .btn-reset-log { background: #c0392b; color: white; flex: 1; }

        .control-group { display: flex; gap: 10px; }

        /* Sensor Grid */
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .sensor-card {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #333;
            text-align: center;
        }

        .sensor-card.active { border-color: var(--primary); background: #1a3a2a; }
        
        .label { font-size: 0.7rem; color: #888; display: block; }
        .time-val { font-size: 1.8rem; font-weight: bold; color: var(--primary); font-family: monospace; }

        /* Table Log */
        .table-container { overflow-x: auto; margin-top: 10px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: #181818; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background: #222; }

        @media (max-width: 600px) {
            .time-val { font-size: 1.4rem; }
            .log-controls { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="main-app" class="container">
        <header style="text-align: center;">
            <h1 style="margin-bottom: 5px;">HEXA SIMULATOR</h1>
            <p style="color: #0cdfee; margin-top: 0;">Sistem by REVA ARYA SAPUTRA</p>
        </header>

        <section class="card">
            <input type="text" id="nama-atlet" placeholder="Masukkan Nama Atlet">
            <div class="control-group">
                <button id="btn-start" class="btn-start" onclick="startSimulasi()">START TEST</button>
                <button id="btn-stop" class="btn-stop" onclick="stopSimulasi()">STOP</button>
            </div>
            <button id="btn-save" class="btn-save" onclick="saveToLog()" style="display:none;">SIMPAN DATA ATLET</button>
        </section>

        <section class="sensor-grid">
            <div class="sensor-card" id="c1"><span class="label">GARIS 1</span><div class="time-val" id="sw1">00.00</div></div>
            <div class="sensor-card" id="c2"><span class="label">GARIS 2</span><div class="time-val" id="sw2">00.00</div></div>
            <div class="sensor-card" id="c3"><span class="label">GARIS 3</span><div class="time-val" id="sw3">00.00</div></div>
            <div class="sensor-card" id="c4"><span class="label">GARIS 4</span><div class="time-val" id="sw4">00.00</div></div>
            <div class="sensor-card" id="c5"><span class="label">GARIS 5</span><div class="time-val" id="sw5">00.00</div></div>
            <div class="sensor-card" id="c6"><span class="label">GARIS 6</span><div class="time-val" id="sw6">00.00</div></div>
        </section>

        <section class="card">
            <h3 style="margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;">REKAPITULASI HASIL</h3>
            <div class="table-container">
                <table id="log-table">
                    <thead>
                        <tr>
                            <th>NO</th>
                            <th>NAMA ATLET</th>
                            <th>L1</th><th>L2</th><th>L3</th><th>L4</th><th>L5</th><th>L6</th>
                        </tr>
                    </thead>
                    <tbody id="log-body">
                        </tbody>
                </table>
            </div>

            <div class="log-controls">
                <button class="btn-download" onclick="downloadXLS()">DOWNLOAD EXCEL (.XLS)</button>
                <button class="btn-reset-log" onclick="clearLog()">RESET LOG DATA</button>
            </div>
        </section>
    </div>

    <script>
        let timerInterval;
        let startTime;
        let currentSensor = 1;
        let dataLog = [];
        let isRunning = false;

        function startSimulasi() {
            const nama = document.getElementById('nama-atlet').value;
            if(!nama) return alert("Harap isi nama atlet terlebih dahulu!");
            if(isRunning) return;

            resetDisplay();
            isRunning = true;
            currentSensor = 1;
            startTime = Date.now();
            document.getElementById('btn-save').style.display = "none";
            document.getElementById('c' + currentSensor).classList.add('active');

            timerInterval = setInterval(updateTimer, 10);
        }

        function updateTimer() {
            let elapsedTime = (Date.now() - startTime) / 1000;
            let formattedTime = elapsedTime.toFixed(2);
            
            document.getElementById('sw' + currentSensor).innerText = formattedTime;

            // Perpindahan otomatis (Simulasi sensor terdeteksi tiap 1 detik)
            if (elapsedTime >= currentSensor) {
                if (currentSensor < 6) {
                    document.getElementById('c' + currentSensor).classList.remove('active');
                    currentSensor++;
                    document.getElementById('c' + currentSensor).classList.add('active');
                } else {
                    stopSimulasi();
                    document.getElementById('btn-save').style.display = "block";
                }
            }
        }

        function stopSimulasi() {
            clearInterval(timerInterval);
            isRunning = false;
            document.querySelectorAll('.sensor-card').forEach(c => c.classList.remove('active'));
        }

        function resetDisplay() {
            for(let i=1; i<=6; i++) {
                document.getElementById('sw'+i).innerText = "00.00";
                document.getElementById('c'+i).classList.remove('active');
            }
        }

        function saveToLog() {
            const nama = document.getElementById('nama-atlet').value;
            const rowData = {
                no: dataLog.length + 1,
                nama: nama,
                l1: document.getElementById('sw1').innerText,
                l2: document.getElementById('sw2').innerText,
                l3: document.getElementById('sw3').innerText,
                l4: document.getElementById('sw4').innerText,
                l5: document.getElementById('sw5').innerText,
                l6: document.getElementById('sw6').innerText
            };

            dataLog.push(rowData);
            updateTable();
            
            document.getElementById('nama-atlet').value = "";
            document.getElementById('btn-save').style.display = "none";
            resetDisplay();
        }

        function updateTable() {
            const tbody = document.getElementById('log-body');
            tbody.innerHTML = "";
            dataLog.forEach((item, index) => {
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td>${item.nama}</td>
                    <td>${item.l1}</td><td>${item.l2}</td><td>${item.l3}</td>
                    <td>${item.l4}</td><td>${item.l5}</td><td>${item.l6}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function clearLog() {
            if(confirm("Apakah Anda yakin ingin menghapus SEMUA data di tabel?")) {
                dataLog = [];
                updateTable();
            }
        }

        function downloadXLS() {
            if(dataLog.length === 0) return alert("Data kosong! Lakukan tes atlet dulu.");

            const wsData = dataLog.map(item => ({
                "NO": item.no,
                "NAMA ATLET": item.nama,
                "LOMPAT 1": item.l1,
                "LOMPAT 2": item.l2,
                "LOMPAT 3": item.l3,
                "LOMPAT 4": item.l4,
                "LOMPAT 5": item.l5,
                "LOMPAT 6": item.l6
            }));

            const worksheet = XLSX.utils.json_to_sheet(wsData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Hasil_Hexa");

            XLSX.writeFile(workbook, "Rekap_HexaTest.xls");
        }
    </script>
</body>
</html>
